version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: srmall_db_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: srmalldb
    ports:
      - "5435:5432"
    volumes:
      - srmall_pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  srmall_pgdata:
